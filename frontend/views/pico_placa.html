<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pico y Placa</title>
    <link
      rel="icon"
      type="image/png"
      href="/frontend/assets/images/restricciones.png"
    />
    <link rel="stylesheet" href="/frontend/assets/css/pico_placa.css" />
  </head>

  <body>
    <header>
      <div id="container-img">
        <img
          class="logo"
          src="/frontend/assets/images/logo_parkin_lot.jpeg"
          alt="Logo Parqueadero"
        />
      </div>

      <nav class="menu" aria-label="Menú principal">
        <ul>
          <li><a href="/frontend/views/reporte_consulta.html">Reportes</a></li>
          <li><a href="/frontend/views/pico_placa.html">Pico & Placa</a></li>
          <li>
            <a href="/frontend/views/registro_incidencias.html">Incidencias</a>
          </li>
          <li>
            <a href="/frontend/views/celdas_parqueo.html">Celdas de parqueo</a>
          </li>
          <li><a href="/frontend/views/acceso.html">Accesos</a></li>
          <li>
            <a href="/frontend/views/registro_vehiculo.html">Vehículos</a>
          </li>
          <li>
            <a id="a-users" href="">Usuarios</a>
            <div class="submenu">
              <ul>
                <li>
                  <a href="/frontend/views/registro_usuario.html">Registro</a>
                </li>
                <li>
                  <a href="/frontend/views/perfil_usuario.html"
                    >Perfil de Usuario</a
                  >
                </li>
              </ul>
            </div>
          </li>
        </ul>
      </nav>

      <div class="tools">
        <div class="search">
          <input type="search" id="inp-search" placeholder="Buscar" />

          <button class="btn-search">
            <img
              src="/frontend/assets/images/lupa.png"
              id="lupa-png"
              alt="Buscar"
            />
          </button>
        </div>

        <select id="language">
          <option>Español</option>
          <option>Inglés</option>
        </select>
      </div>
    </header>

    <main>
      <div class="pico-placa-wrapper">
        <h1>Pico & Placa</h1>

        <div class="pico-placa-layout">
          <!-- Formulario -->
          <div class="pico-placa-form-container">
            <div class="section-title">Nueva Restricción</div>
            <form id="form-pico-placa">
              <div>
                <label for="tipo-vehiculo"
                  >Tipo de vehículo <span class="required">*</span></label
                >
                <select id="tipo-vehiculo" required>
                  <option value="">Seleccione</option>
                  <option value="Carro">Carro (último dígito)</option>
                  <option value="Moto">Moto (primer dígito)</option>
                </select>
              </div>

              <div>
                <label for="dia">Día <span class="required">*</span></label>
                <select id="dia" required>
                  <option value="">Seleccione</option>
                  <option value="Lunes">Lunes</option>
                  <option value="Martes">Martes</option>
                  <option value="Miercoles">Miércoles</option>
                  <option value="Jueves">Jueves</option>
                  <option value="Viernes">Viernes</option>
                </select>
              </div>

              <div>
                <label for="numero"
                  >Dígito restringido <span class="required">*</span></label
                >
                <input
                  id="numero"
                  type="number"
                  min="0"
                  max="9"
                  required
                  placeholder="0 - 9"
                />
              </div>

              <div class="buttons">
                <button type="submit" class="btn-primary">
                  Guardar Restricción
                </button>
              </div>
            </form>
          </div>

          <!-- Tabla de restricciones -->
          <div class="pico-placa-table-container">
            <div class="section-title">Restricciones Registradas</div>
            <div id="restricciones-container"></div>
          </div>
        </div>
      </div>
    </main>

    <footer>
      © Copyright - 2026: Todos los derechos reservados. Política de privacidad
    </footer>

    <script type="module" src="/frontend/assets/js/pico_placa.js"></script>
  </body>
</html>
