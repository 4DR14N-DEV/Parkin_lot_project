<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accesos</title>
    <link
      rel="icon"
      type="image/png"
      href="/frontend/assets/images/carro.png"
    />
    <link rel="stylesheet" href="/frontend/assets/css/acceso.css" />
  </head>

  <body>
    <header>
      <div id="container-img">
        <img
          class="logo"
          src="/frontend/assets/images/logo_parkin_lot.jpeg"
          alt="Logo Parqueadero"
        />
      </div>

      <nav class="menu" aria-label="Menú principal">
        <ul>
          <li><a href="/frontend/views/reporte_consulta.html">Reportes</a></li>
          <li><a href="/frontend/views/pico_placa.html">Pico & Placa</a></li>
          <li>
            <a href="/frontend/views/registro_incidencias.html">Incidencias</a>
          </li>
          <li>
            <a href="/frontend/views/celdas_parqueo.html">Celdas de parqueo</a>
          </li>
          <li><a href="/frontend/views/acceso.html">Accesos</a></li>
          <li>
            <a href="/frontend/views/registro_vehiculo.html">Vehículos</a>
          </li>
          <li>
            <a id="a-users" href="">Usuarios</a>
            <div class="submenu">
              <ul>
                <li>
                  <a href="/frontend/views/registro_usuario.html">Registro</a>
                </li>
                <li>
                  <a href="/frontend/views/perfil_usuario.html"
                    >Perfil de Usuario</a
                  >
                </li>
              </ul>
            </div>
          </li>
        </ul>
      </nav>

      <div class="tools">
        <div class="search">
          <button id="btn-logout" class="btn-search">Cerrar sesion</button>
        </div>
      </div>
    </header>

    <main>
      <div class="container">
        <h1>Accesos</h1>

        <!-- Tabs -->
        <div class="tabs">
          <button id="tab-entrada" class="tab-button active">Entrada</button>
          <button id="tab-salida" class="tab-button">Salida</button>
        </div>

        <!-- FORMULARIO ENTRADA -->
        <div id="panel-entrada" class="tab-panel active">
          <div class="section">
            <div class="section-title">Registro de Entrada</div>
            <form id="form-entrada" class="form-grid">
              <div>
                <label for="puerta-entrada"
                  >Puerta de acceso <span class="required">*</span></label
                >
                <select id="puerta-entrada" required>
                  <option value="">Seleccione</option>
                  <option value="Puerta Norte">Puerta Norte</option>
                  <option value="Puerta Sur">Puerta Sur</option>
                  <option value="Puerta Principal">Puerta Principal</option>
                </select>
              </div>

              <div>
                <label for="placa-entrada"
                  >Placa <span class="required">*</span></label
                >
                <input
                  id="placa-entrada"
                  class="inp-main"
                  type="text"
                  placeholder="Ingrese la placa"
                  required
                />
              </div>

              <div>
                <label for="celda-entrada"
                  >Celda disponible <span class="required">*</span></label
                >
                <select id="celda-entrada" required>
                  <option value="">Seleccione una celda</option>
                </select>
              </div>

              <div>
                <label for="fecha-entrada">Fecha</label>
                <input
                  id="fecha-entrada"
                  class="inp-main"
                  type="date"
                  disabled
                />
              </div>

              <div>
                <label for="hora-entrada">Hora</label>
                <input
                  id="hora-entrada"
                  class="inp-main"
                  type="time"
                  disabled
                />
              </div>

              <div class="full-width buttons">
                <button type="submit" class="btn-primary">
                  Registrar Entrada
                </button>
              </div>
            </form>
          </div>
        </div>

        <!-- FORMULARIO SALIDA -->
        <div id="panel-salida" class="tab-panel">
          <div class="section">
            <div class="section-title">Registro de Salida</div>
            <form id="form-salida" class="form-grid">
              <div>
                <label for="puerta-salida"
                  >Puerta de acceso <span class="required">*</span></label
                >
                <select id="puerta-salida" required>
                  <option value="">Seleccione</option>
                  <option value="Puerta Norte">Puerta Norte</option>
                  <option value="Puerta Sur">Puerta Sur</option>
                  <option value="Puerta Principal">Puerta Principal</option>
                </select>
              </div>

              <div>
                <label for="placa-salida"
                  >Placa <span class="required">*</span></label
                >
                <input
                  id="placa-salida"
                  class="inp-main"
                  type="text"
                  placeholder="Ingrese la placa"
                  required
                />
              </div>

              <div>
                <label for="fecha-salida">Fecha</label>
                <input
                  id="fecha-salida"
                  class="inp-main"
                  type="date"
                  disabled
                />
              </div>

              <div>
                <label for="hora-salida">Hora</label>
                <input id="hora-salida" class="inp-main" type="time" disabled />
              </div>

              <div class="full-width buttons">
                <button type="submit" class="btn-danger">
                  Registrar Salida
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <footer>
      © Copyright - 2026: Todos los derechos reservados. Política de privacidad
    </footer>

    <script type="module" src="/frontend/assets/js/acceso.js"></script>
  </body>
</html>
