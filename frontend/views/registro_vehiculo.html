<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Registro de Vehiculo</title>
    <link rel="stylesheet" href="/frontend/assets/css/registro_vehiculo.css" />
    <link
      rel="icon"
      type="image/png"
      href="/frontend/assets/images/formulario-de-llenado.png"
    />
  </head>

  <body>
    <header>
      <div id="container-img">
        <img
          class="logo"
          src="/frontend/assets/images/logo_parkin_lot.jpeg"
          alt="Logo Parqueadero"
        />
      </div>

      <nav class="menu" aria-label="Menú principal">
        <ul>
          <li><a href="/frontend/views/reporte_consulta.html">Reportes</a></li>
          <li><a href="/frontend/views/pico_placa.html">Pico & Placa</a></li>
          <li>
            <a href="/frontend/views/registro_incidencias.html">Incidencias</a>
          </li>
          <li>
            <a href="/frontend/views/celdas_parqueo.html">Celdas de parqueo</a>
          </li>
          <li><a href="/frontend/views/acceso.html">Accesos</a></li>
          <li>
            <a href="/frontend/views/registro_vehiculo.html">Vehículos</a>
          </li>
          <li>
            <a id="a-users" href="">Usuarios</a>
            <div class="submenu">
              <ul>
                <li>
                  <a href="/frontend/views/registro_usuario.html">Registro</a>
                </li>
                <li>
                  <a href="/frontend/views/perfil_usuario.html"
                    >Perfil de Usuario</a
                  >
                </li>
              </ul>
            </div>
          </li>
        </ul>
      </nav>

      <div class="tools">
        <div class="search">
          <button id="btn-logout" class="btn-search">Cerrar sesion</button>
        </div>
      </div>
    </header>

    <div class="container">
      <h1>Registro de Vehículos</h1>

      <form id="form-vehiculo">
        <div class="section">
          <div class="form-grid">
            <div>
              <label for="placa">Placa <span class="required">*</span></label>
              <input
                id="placa"
                class="inp-main"
                type="text"
                placeholder="Ingrese la placa"
                required
              />
            </div>

            <div>
              <label for="tipo"
                >Tipo de Vehículo <span class="required">*</span></label
              >
              <select id="tipo" required>
                <option value="">Seleccione</option>
                <option value="carro">Carro</option>
                <option value="moto">Moto</option>
                <option value="camion">Camión</option>
              </select>
            </div>

            <div>
              <label for="marca">Marca <span class="required">*</span></label>
              <input
                id="marca"
                class="inp-main"
                type="text"
                placeholder="Ingrese la marca del vehículo"
                required
              />
            </div>

            <div>
              <label for="modelo">Modelo <span class="required">*</span></label>
              <input
                id="modelo"
                class="inp-main"
                type="text"
                placeholder="Ingrese el modelo"
                required
              />
            </div>

            <div id="color">
              <label for="color-input"
                >Color <span class="required">*</span></label
              >
              <input
                id="color-input"
                class="inp-main"
                type="text"
                placeholder="Ingrese el color del vehículo"
                required
              />
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Asignar a Usuario</div>
          <div class="form-grid">
            <div>
              <label for="usuario-id"
                >ID de Usuario <span class="required">*</span></label
              >
              <input
                id="usuario-id"
                class="inp-main"
                type="number"
                placeholder="Ingrese el ID del usuario"
                required
              />
            </div>
            <div>
              <label for="usuario-nombre">Nombre del Usuario</label>
              <input
                id="usuario-nombre"
                class="inp-main"
                type="text"
                disabled
              />
            </div>
          </div>
        </div>

        <div class="full-width buttons">
          <button type="submit" class="btn-primary">Registrar</button>
          <button type="reset" class="btn-secondary">Limpiar</button>
        </div>
      </form>

      <button id="btn-ver-vehiculos" type="button">Ver Vehículos</button>
    </div>

    <footer>
      © Copyright - 2026: Todos los derechos reservados. Política de privacidad
    </footer>

    <dialog id="vehiculosDialog">
      <div id="vehiculos-dialog-header">
        <h2>Vehiculos registrados</h2>
        <button id="close-vehiculos-dialog">X</button>
      </div>
      <div id="vehiculos-table-container"></div>
    </dialog>

    <dialog id="edit-vehiculo-dialog">
      <div id="edit-vehiculo-title">
        <h1>Editar vehículo</h1>
      </div>
      <form method="post" id="edit-vehiculo-form">
        <div>
          <label for="edit-placa">Placa:</label>
          <input type="text" id="edit-placa" />
        </div>
        <div>
          <label for="edit-tipo">Tipo de vehículo:</label>
          <select id="edit-tipo">
            <option value="">Seleccione</option>
            <option value="carro">Carro</option>
            <option value="moto">Moto</option>
            <option value="camion">Camión</option>
          </select>
        </div>
        <div>
          <label for="edit-marca">Marca:</label>
          <input type="text" id="edit-marca" />
        </div>
        <div>
          <label for="edit-modelo">Modelo:</label>
          <input type="text" id="edit-modelo" />
        </div>
        <div>
          <label for="edit-color">Color:</label>
          <input type="text" id="edit-color" />
        </div>
        <div>
          <label for="edit-usuario">ID Usuario:</label>
          <input type="number" id="edit-usuario" />
        </div>
        <div id="edit-vehiculo-buttons">
          <button id="edit-vehiculo-save" type="submit">Guardar</button>
          <button id="edit-vehiculo-close" type="button">Cancelar</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="/frontend/assets/js/vehiculo.js"></script>
  </body>
</html>
