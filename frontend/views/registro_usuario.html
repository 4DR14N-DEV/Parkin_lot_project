<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="/frontend/assets/css/registro_usuario.css" />
    <link
      rel="icon"
      type="image/png"
      href="/frontend/assets/images/carro.png"
    />
  </head>

  <body>
    <header>
      <div id="container-img">
        <img
          class="logo"
          src="/frontend/assets/images/logo_parkin_lot.jpeg"
          alt="Logo Parqueadero"
        />
      </div>

      <nav class="menu" aria-label="Menú principal">
        <ul>
          <li><a href="/frontend/views/reporte_consulta.html">Reportes</a></li>
          <li><a href="/frontend/views/pico_placa.html">Pico & Placa</a></li>
          <li>
            <a href="/frontend/views/registro_incidencias.html">Incidencias</a>
          </li>
          <li>
            <a href="/frontend/views/celdas_parqueo.html">Celdas de parqueo</a>
          </li>
          <li><a href="/frontend/views/acceso.html">Accesos</a></li>
          <li>
            <a href="/frontend/views/registro_vehiculo.html">Vehículos</a>
          </li>
          <li>
            <a id="a-users" href="">Usuarios</a>
            <div class="submenu">
              <ul>
                <li>
                  <a href="/frontend/views/registro_usuario.html">Registro</a>
                </li>
                <li>
                  <a href="/frontend/views/perfil_usuario.html"
                    >Perfil de Usuario</a
                  >
                </li>
              </ul>
            </div>
          </li>
        </ul>
      </nav>

      <div class="tools">
        <div class="search">
          <button id="btn-logout" class="btn-search">Cerrar sesion</button>
        </div>
      </div>
    </header>

    <main>
      <div class="container">
        <h1>Registro de Usuario</h1>

        <form id="form-registro">
          <div class="section">
            <div class="section-title">Documentación</div>
            <div class="form-grid">
              <div>
                <label for="tipo-documento"
                  >Tipo de documento <span class="required">*</span></label
                >
                <select id="tipo-documento" required>
                  <option value="">Seleccione...</option>
                  <option value="cc">Cédula</option>
                  <option value="pasaporte">Pasaporte</option>
                  <option value="ce">Cédula extranjera</option>
                  <option value="dni">DNI</option>
                </select>
              </div>

              <div>
                <label for="numero-documento"
                  >Número de documento <span class="required">*</span></label
                >
                <input
                  id="numero-documento"
                  class="inp-main"
                  type="text"
                  required
                  placeholder="Ej: 1034265448"
                />
              </div>
            </div>
          </div>

          <div class="section">
            <div class="section-title">Datos Personales</div>
            <div class="form-grid">
              <div>
                <label for="primer-nombre"
                  >Primer nombre <span class="required">*</span></label
                >
                <input
                  id="primer-nombre"
                  class="inp-main"
                  type="text"
                  required
                  placeholder="Ej: Juan"
                />
              </div>

              <div>
                <label for="segundo-nombre">Segundo nombre</label>
                <input
                  id="segundo-nombre"
                  class="inp-main"
                  type="text"
                  placeholder="Ej: Carlos"
                />
              </div>

              <div>
                <label for="primer-apellido"
                  >Primer apellido <span class="required">*</span></label
                >
                <input
                  id="primer-apellido"
                  class="inp-main"
                  type="text"
                  required
                  placeholder="Ej: Pérez"
                />
              </div>

              <div>
                <label for="segundo-apellido">Segundo apellido</label>
                <input
                  id="segundo-apellido"
                  class="inp-main"
                  type="text"
                  placeholder="Ej: López"
                />
              </div>

              <div>
                <label for="direccion-correo">Correo electrónico</label>
                <input
                  id="direccion-correo"
                  class="inp-main"
                  type="email"
                  placeholder="example@example.com"
                />
              </div>

              <div>
                <label for="numero-celular">Número de celular</label>
                <input
                  id="numero-celular"
                  class="inp-main"
                  type="tel"
                  placeholder="+57 3002005212"
                />
              </div>
            </div>
          </div>

          <div class="section">
            <div class="section-title">Credenciales y Perfil</div>
            <div class="form-grid">
              <div>
                <label for="clave"
                  >Contraseña <span class="required">*</span></label
                >
                <input
                  id="clave"
                  class="inp-main"
                  type="password"
                  required
                  placeholder="Ingrese una contraseña"
                />
              </div>

              <div>
                <label for="perfil-usuario"
                  >Perfil de usuario <span class="required">*</span></label
                >
                <select id="perfil-usuario" required>
                  <option value="">Seleccione...</option>
                  <option value="1">Administrador</option>
                  <option value="2">Operador</option>
                  <option value="3">Usuario</option>
                </select>
              </div>

              <div>
                <label for="foto-perfil">Foto de perfil (URL)</label>
                <input
                  id="foto-perfil"
                  class="inp-main"
                  type="text"
                  placeholder="URL de la imagen (opcional)"
                />
              </div>
            </div>
          </div>

          <div class="full-width buttons">
            <button type="submit" class="btn-primary">Registrar</button>
            <button type="reset" class="btn-secondary">Limpiar</button>
          </div>
        </form>
      </div>
    </main>

    <footer>
      © Copyright - 2026: Todos los derechos reservados. Política de privacidad
    </footer>

    <script
      type="module"
      src="/frontend/assets/js/registro_usuario.js"
    ></script>
  </body>
</html>
